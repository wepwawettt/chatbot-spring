apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-alarm-api
  namespace: device-alarm-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: device-alarm-api
  template:
    metadata:
      labels:
        app: device-alarm-api
    spec:
      containers:
        - name: api
          image: device-alarm-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: device-alarm-config
            - secretRef:
                name: device-alarm-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: device-alarm-api
  namespace: device-alarm-demo
spec:
  selector:
    app: device-alarm-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
