services:
  postgres:
    image: postgres:16-alpine
    container_name: device-alarm-postgres
    environment:
      POSTGRES_DB: device_alarm_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d device_alarm_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: device-alarm-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/device_alarm_demo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data:
