spring.application.name=device-alarm-demo
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/device_alarm_demo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.security.default-admin.username=admin
app.security.default-admin.email=admin@example.com
app.security.default-admin.password=admin123

app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
