spring.application.name=device-alarm-demo
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/device_alarm_demo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

spring.cache.type=caffeine
spring.cache.cache-names=devices,userDevices,deviceDetails,alarms,alarmCounts,alarmGroups
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s

app.conversation.persistence-enabled=${CONVERSATION_PERSISTENCE_ENABLED:false}
app.conversation.cache.maximum-size=${CONVERSATION_CACHE_MAXIMUM_SIZE:1000}
app.conversation.cache.expire-after-minutes=${CONVERSATION_CACHE_EXPIRE_AFTER_MINUTES:60}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.security.default-admin.username=admin
app.security.default-admin.email=admin@example.com
app.security.default-admin.password=admin123
app.security.alerts.admin-email=${ADMIN_ALERT_EMAIL:admin@example.com}
app.security.alerts.mail-enabled=${ADMIN_ALERT_MAIL_ENABLED:false}

app.rabbitmq.enabled=${RABBITMQ_ENABLED:false}
app.rabbitmq.exchange=${RABBITMQ_EXCHANGE:device-alarm.events}
app.rabbitmq.telemetry-queue=${RABBITMQ_TELEMETRY_QUEUE:device.telemetry.generated}
app.rabbitmq.alarm-queue=${RABBITMQ_ALARM_QUEUE:alarm.created}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

app.simulator.enabled=${SIMULATOR_ENABLED:false}
app.simulator.fixed-delay-ms=${SIMULATOR_FIXED_DELAY_MS:60000}

app.rate-limit.chat.limit=${CHAT_RATE_LIMIT:20}
app.rate-limit.chat.window-seconds=${CHAT_RATE_LIMIT_WINDOW_SECONDS:60}

app.demo-data.enabled=${DEMO_DATA_ENABLED:true}

app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
